<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - HotSpring Portable Spas</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="site-header"></div>

<div class="page-wrapper">
  <div class="page-inner">
    <div class="breadcrumb"><a href="../index.html">Home</a> <span>›</span> My Account</div>
    <h1 class="page-title">Forget Your Password</h1>

    <div class="content-box">
      <div class="form-section-title">User Account Details</div>
      <p class="form-note">Please enter your email address below to retrieve your password.</p>
      <p class="form-note" style="color:#cc0000;">*Required Fields</p>

      <form id="forgot-form" novalidate>
        <div class="form-group">
          <label>Email <span class="req">*</span></label>
          <div>
            <input type="email" name="email" class="form-control" required>
            <span class="error-msg"></span>
          </div>
        </div>
        <div style="margin-left:150px;margin-bottom:12px;">
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#555;text-align:left;width:auto;min-width:auto;padding:0;">
            <input type="checkbox" name="remember"> Remember me th next time I visit
          </label>
        </div>
        <div style="margin-left:150px;">
          <button type="submit" class="btn btn-red">SUBMIT</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div id="site-footer"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="../js/components.js"></script>
<script src="../js/main.js"></script>
<script>HotSpring.init('');</script>
</body>
</html>
