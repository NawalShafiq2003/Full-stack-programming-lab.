<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - HotSpring Portable Spas</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="site-header"></div>

<div class="page-wrapper">
  <div class="page-inner">
    <div class="breadcrumb"><a href="../index.html">Home</a> <span>›</span> Register</div>
    <h1 class="page-title">Create New Account</h1>

    <div class="content-box">
      <div class="form-section-title">User Account Details</div>
      <p class="form-note">To create a new account, please fill in the required information below. Passwords are case sensitive and must be 6 to 20 characters long</p>
      <p class="form-note" style="color:#cc0000;">*Required Fields</p>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label>Email Address <span class="req">*</span></label>
          <div>
            <input type="email" name="email" class="form-control" required>
            <span class="error-msg"></span>
          </div>
        </div>
        <div class="form-group">
          <label>Password <span class="req">*</span></label>
          <div>
            <input type="password" name="password" class="form-control" required>
            <span class="error-msg"></span>
          </div>
        </div>
        <div class="form-group">
          <label>Re-enter Password <span class="req">*</span></label>
          <div>
            <input type="password" name="confirm_password" class="form-control" required>
            <span class="error-msg"></span>
          </div>
        </div>
        <div class="form-group">
          <label>First Name <span class="req">*</span></label>
          <div>
            <input type="text" name="first_name" class="form-control" required>
            <span class="error-msg"></span>
          </div>
        </div>
        <div class="form-group">
          <label>Last Name <span class="req">*</span></label>
          <div>
            <input type="text" name="last_name" class="form-control" required>
            <span class="error-msg"></span>
          </div>
        </div>

        <div style="margin-left:150px;margin-bottom:12px;">
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#555;text-align:left;width:auto;min-width:auto;padding:0;">
            <input type="checkbox" name="newsletter"> Yes, I want to receive email about new products and specials!
          </label>
        </div>

        <div style="margin-left:150px;display:flex;align-items:center;gap:15px;">
          <button type="submit" class="btn btn-red">CREATE ACCOUNT</button>
          <a href="forgot_password.html" style="font-size:12px;color:#0066cc;">Forgot your password?</a>
        </div>
      </form>
    </div>
  </div>
</div>

<div id="site-footer"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="../js/components.js"></script>
<script src="../js/main.js"></script>
<script>HotSpring.init('');</script>
</body>
</html>
