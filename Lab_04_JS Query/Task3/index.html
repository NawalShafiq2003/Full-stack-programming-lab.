<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task 3 - Interactive Form Validation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="wrapper">
    <div class="form-card">
      <div class="form-header">
        <h1>Create Account</h1>
        <p>Fill in the fields below. Errors highlight on blur; submit validates all fields.</p>
      </div>

      <form id="regForm" novalidate>

        <div class="field-group" id="fg-name">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="e.g. Ali Hassan" autocomplete="off" />
          <span class="error-msg" id="err-name"></span>
        </div>

        <div class="field-group" id="fg-email">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="e.g. ali@example.com" autocomplete="off" />
          <span class="error-msg" id="err-email"></span>
        </div>

        <div class="field-group" id="fg-phone">
          <label for="phone">Phone Number</label>
          <input type="text" id="phone" name="phone" placeholder="e.g. 03001234567" autocomplete="off" />
          <span class="error-msg" id="err-phone"></span>
        </div>

        <div class="field-group" id="fg-password">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Minimum 8 characters" />
          <span class="error-msg" id="err-password"></span>
        </div>

        <div class="field-group" id="fg-confirm">
          <label for="confirm">Confirm Password</label>
          <input type="password" id="confirm" name="confirm" placeholder="Repeat your password" />
          <span class="error-msg" id="err-confirm"></span>
        </div>

        <button type="submit" id="submitBtn">Create Account</button>

      </form>

      <div class="success-message" id="successMsg">
        <strong>Account created successfully!</strong>
        <p>Your registration has been completed. You may now log in.</p>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
