<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 5 – Chained Style Editor</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="editor-card">
    <h1>🎨 Chained Style Editor</h1>
    <div class="preview-box">
      <p id="styledText">✨ Style this text using the buttons below! Each button uses jQuery chaining to apply multiple effects at once.</p>
    </div>
    <div class="btn-grid">
      <button class="style-btn btn-font-up">⬆ Font Size</button>
      <button class="style-btn btn-font-down">⬇ Font Size</button>
      <button class="style-btn btn-color">🎨 Change Color</button>
      <button class="style-btn btn-bg">🖌 Change BG</button>
      <button class="style-btn btn-bold">Toggle Bold</button>
      <button class="style-btn btn-italic">Toggle Italic</button>
      <button class="style-btn btn-highlight">✨ Highlight</button>
      <button class="style-btn btn-shadow">Add Shadow</button>
      <button class="style-btn btn-reset">🔄 Reset All Styles</button>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
