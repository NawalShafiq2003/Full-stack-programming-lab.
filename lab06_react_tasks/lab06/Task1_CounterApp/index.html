<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Task 1 – Counter App</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0f0f;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #f0f0f0;
  }
  .container {
    text-align: center;
    padding: 3rem 4rem;
    background: #1a1a1a;
    border-radius: 24px;
    border: 1px solid #2a2a2a;
    min-width: 340px;
  }
  .label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 1rem;
  }
  .count {
    font-size: 96px;
    font-weight: 700;
    line-height: 1;
    transition: color 0.3s;
    margin-bottom: 0.25rem;
  }
  .count.zero { color: #444; }
  .count.low { color: #e0e0e0; }
  .count.high { color: #60a5fa; }
  .state-hint {
    font-size: 12px;
    color: #444;
    font-family: monospace;
    margin-bottom: 2.5rem;
  }
  .buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  button {
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    letter-spacing: 0.02em;
  }
  button:active { transform: scale(0.95); }
  button:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .btn-inc { background: #22c55e; color: #000; }
  .btn-dec { background: #ef4444; color: #fff; }
  .btn-reset { background: #2a2a2a; color: #aaa; border: 1px solid #333; }
  .note {
    margin-top: 1.5rem;
    font-size: 12px;
    color: #555;
    background: #111;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid #1e1e1e;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState } = React;

  function Counter() {
    const [count, setCount] = useState(0);

    const increment = () => setCount(prev => prev + 1);
    const decrement = () => setCount(prev => Math.max(0, prev - 1));
    const reset     = () => setCount(0);

    const colorClass = count === 0 ? 'zero' : count >= 10 ? 'high' : 'low';

    return (
      <div className="container">
        <p className="label">Lab Task 1 — React State</p>
        <div className={`count ${colorClass}`}>{count}</div>
        <p className="state-hint">const [count, setCount] = useState(0)</p>
        <div className="buttons">
          <button className="btn-inc" onClick={increment}>＋ Increment</button>
          <button className="btn-dec" onClick={decrement} disabled={count === 0}>− Decrement</button>
          <button className="btn-reset" onClick={reset}>↺ Reset</button>
        </div>
        {count === 0 && (
          <p className="note">Count cannot go below 0</p>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Counter />);
</script>
</body>
</html>
